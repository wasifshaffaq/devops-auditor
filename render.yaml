services:
  # 1. The Engine (Backend) - Docker Service
  - type: web
    name: auditor-engine
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false 
      - key: PORT
        value: 5001

  # 2. The Marketing Gateway (Landing Page) - Next.js
  - type: web
    name: auditor-gateway
    env: node
    plan: free
    healthCheckPath: /
    # Added NEXT_TELEMETRY_DISABLED to save resources and ensuring build memory
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: landing
    envVars:
      - key: NODE_VERSION
        value: 20.9.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  # 3. The Engineering HUD (Frontend) - Static Site
  - type: web
    name: auditor-hud
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://auditor-engine.onrender.com
