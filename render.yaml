services:
  # 1. The Engine (Backend)
  - type: web
    name: auditor-engine
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: PORT
        value: 5001

  # 2. The Marketing Gateway (Landing Page)
  - type: web
    name: auditor-gateway
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: landing
    envVars:
      - key: NODE_VERSION
        value: 20.0.0

  # 3. The Engineering HUD (Frontend - Static Site)
  - type: static
    name: auditor-hud
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        # Note: Static sites are browser-side, so we point to the public engine URL.
        value: https://auditor-engine.onrender.com
